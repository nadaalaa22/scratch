<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sessions</title>

  <style>
    body {
      margin: 0;
      font-family: "Cairo", sans-serif;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      color: #fff;
      text-align: center;
    }

    h1 {
      margin-top: 30px;
      font-size: 2.5rem;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      padding: 30px;
    }

    .card {
      background: #ffffff;
      color: #333;
      border-radius: 15px;
      padding: 20px;
      text-decoration: none;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-10px) scale(1.05);
      background: #f1f1f1;
    }

    .card h2 {
      margin: 10px 0;
      font-size: 1.5rem;
    }

    .emoji {
      font-size: 2rem;
    }

    footer {
      margin: 20px;
      font-size: 0.9rem;
      opacity: 0.8;
    }
  </style>
</head>
<body>

  <h1>🎓 الجلسات التعليمية</h1>
  <p>اختاري السيشن اللي عايزة تبدأي بيها 👇</p>

  <div class="container" id="sessions"></div>

  <footer>
    Made with ❤️
  </footer>

  <script>
    const container = document.getElementById("sessions");

    const totalSessions = 10; // غيري الرقم حسب عدد السيشنز

    const emojis = ["📘","📗","📕","📙","📒","📓","📔","📚"];

    for (let i = 1; i <= totalSessions; i++) {
      const card = document.createElement("a");
      card.href = `session_${i}.html`;
      card.className = "card";

      const emoji = emojis[i % emojis.length];

      card.innerHTML = `
        <div class="emoji">${emoji}</div>
        <h2>Session ${i}</h2>
        <p>اضغطي لفتح الجلسة</p>
      `;

      container.appendChild(card);
    }
  </script>

</body>
</html>
