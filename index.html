<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>CodeQuest · Learning Sessions</title>
  <!-- Google Fonts + modern typography -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, 'Segoe UI', -apple-system, sans-serif;
      background: radial-gradient(ellipse at 20% 30%, #0b2b44, #041a2b);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      padding: 2rem 1.5rem;
      position: relative;
    }

    /* subtle grain texture */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
      z-index: 0;
    }

    .main-wrapper {
      max-width: 1300px;
      width: 100%;
      position: relative;
      z-index: 2;
    }

    /* header section */
    .hero {
      text-align: center;
      margin-bottom: 2.5rem;
      animation: fadeSlideDown 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    .hero h1 {
      font-size: 3.2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #FFFFFF, #C0E0FF);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      text-shadow: 0 2px 5px rgba(0,0,0,0.1);
      margin-bottom: 0.5rem;
    }

    .hero .badge-sub {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(4px);
      padding: 0.35rem 1rem;
      border-radius: 60px;
      font-size: 0.85rem;
      font-weight: 500;
      margin-top: 0.5rem;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .hero p {
      font-size: 1.15rem;
      opacity: 0.85;
      margin-top: 1rem;
      max-width: 550px;
      margin-left: auto;
      margin-right: auto;
    }

    /* modern grid */
    .session-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 2rem;
      margin: 2rem 0 3rem;
    }

    /* glassmorphic card design (clean, no description) */
    .session-card {
      background: rgba(255, 255, 255, 0.97);
      backdrop-filter: blur(0px);
      border-radius: 2rem;
      padding: 1.8rem 1.5rem 1.8rem 1.5rem;
      text-decoration: none;
      color: #1a2c3e;
      transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      box-shadow: 0 18px 30px -12px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(255,255,255,0.2) inset;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.5);
    }

    /* decorative gradient border on hover */
    .session-card::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 2rem;
      padding: 2px;
      background: linear-gradient(125deg, #3b82f6, #a855f7, #38bdf8);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }

    .session-card:hover::after {
      opacity: 1;
    }

    .session-card:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 28px 38px -16px rgba(0, 0, 0, 0.35);
      background: #ffffff;
    }

    /* emoji area with playful animation */
    .card-emoji {
      font-size: 3.2rem;
      margin-bottom: 1rem;
      transition: transform 0.2s ease;
      display: inline-block;
      width: fit-content;
      background: rgba(59,130,246,0.1);
      padding: 0.6rem;
      border-radius: 2rem;
      line-height: 1;
    }

    .session-card:hover .card-emoji {
      transform: scale(1.1) rotate(2deg);
    }

    .session-title {
      font-size: 1.7rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      margin: 0.25rem 0 1rem;
      color: #0f2b3d;
    }

    /* action row: start journey + arrow */
    .card-action {
      margin-top: 0.5rem;
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      font-size: 0.9rem;
      color: #2563eb;
      transition: gap 0.2s;
      border-top: 1px solid rgba(0,0,0,0.05);
      padding-top: 1rem;
    }

    .card-action span:first-child {
      transition: transform 0.2s;
    }

    .session-card:hover .card-action span:first-child {
      transform: translateX(5px);
    }

    .arrow-icon {
      font-size: 1.1rem;
      transition: transform 0.2s;
    }

    .session-card:hover .arrow-icon {
      transform: translateX(4px);
    }

    /* empty state */
    .empty-state {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      border-radius: 2rem;
      padding: 3rem 2rem;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.3);
    }

    .empty-emoji {
      font-size: 4rem;
      margin-bottom: 1rem;
    }

    /* footer */
    .footer-note {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.85rem;
      opacity: 0.7;
      letter-spacing: 0.3px;
      backdrop-filter: blur(4px);
      width: fit-content;
      margin-left: auto;
      margin-right: auto;
      padding: 0.5rem 1.2rem;
      border-radius: 60px;
      background: rgba(0,0,0,0.25);
    }

    .footer-note i {
      font-style: normal;
      display: inline-block;
      animation: pulseLove 1.4s infinite;
    }

    /* keyframes */
    @keyframes fadeSlideDown {
      0% { opacity: 0; transform: translateY(-20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulseLove {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }

    .session-card {
      animation: cardReveal 0.5s ease-out backwards;
    }

    @keyframes cardReveal {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 640px) {
      body { padding: 1rem; }
      .hero h1 { font-size: 2.2rem; }
      .session-grid { gap: 1.2rem; }
      .session-card { padding: 1.5rem; }
      .session-title { font-size: 1.4rem; }
    }

    .session-card:focus-visible {
      outline: 3px solid #ffb347;
      outline-offset: 4px;
      transform: scale(1.01);
    }
  </style>
</head>
<body>
<div class="main-wrapper">
  <div class="hero">
    <h1>🎓 Learning Sessions</h1>
   
    <p>Pick a session and start your journey into the world of computing and programming</p>
  </div>

  <div id="sessionsContainer" class="session-grid"></div>

  <div class="footer-note">
    Made with ❤️ for curious minds | Learn interactively
  </div>
</div>

<script>
  (function() {
    // ✅ Total sessions updated to 21
    const totalSessions = 8;

    const sessionsData = {
      1: {
        emoji: "💻⚙️",
        title: "Session 1: Computer Basics & Algorithms"
      },
      2: {
        emoji: "📦🔢",
        title: "Session 2: Movement and Directions"
      },
      3: {
        emoji: "🔁✨",
        title: "Session 3: Repeat, Bounce & Interactive Events"
      },
      4: {
        emoji: "🎭👗",
        title: "Session 4: Looks — Say, Size, Costumes & Movement"
      },
      5: {
        emoji: "🎵🔊",
        title: "Session 5: Sound — Play, Volume, Record & TTS"
      },
      6: {
        emoji: "⚡❓",
        title: "Session 6: Conditional Statements (If)"
      },
      7: {
        emoji: "🎉🧠",
        title: "Session 7: Big Revision (Sessions 1–6)"
      },
      8: {
        emoji: "🏆🐱",
        title: "Session 8: Practical Exam — Interactive Cat"
      },
      9: {
        emoji: "🔁♾️",
        title: "Session 9: Forever, Wait & Repeat Until"
      },
      10: {
        emoji: "📦🔢",
        title: "Session 10: Variables — Score Counter"
      },
      11: {
        emoji: "🖐️🎯",
        title: "Session 11: Sensing & Touching"
      },
      12: {
        emoji: "🗺️🚀",
        title: "Session 12: Coordinates & Glide"
      },
      13: {
        emoji: "📢💬",
        title: "Session 13: Broadcast Messages"
      },
      14: {
        emoji: "🎲🤔",
        title: "Session 14: Guessing Game (Variables + If)"
      },
      15: {
        emoji: "👯💧",
        title: "Session 15: Clones"
      },
      16: {
        emoji: "🖌️🌈",
        title: "Session 16: Pen — Drawing with Code"
      },
      17: {
        emoji: "🍎🧺",
        title: "Session 17: Project — Catch the Falling Fruits"
      },
      18: {
        emoji: "🌀🏁",
        title: "Session 18: Project — Maze Game"
      },
      19: {
        emoji: "🎬✨",
        title: "Session 19: Project — Animated Interactive Story"
      },
      20: {
        emoji: "🏆❓",
        title: "Session 20: Project — Quiz Game"
      },
      21: {
        emoji: "🎓🎉",
        title: "Session 21: Your Own Project + Graduation"
      }
    };
    
    function getSessionData(index) {
      if (sessionsData[index]) {
        return sessionsData[index];
      }
      // fallback
      return {
        emoji: "📘✨",
        title: `Session ${index}`
      };
    }
    
    const container = document.getElementById("sessionsContainer");
    if (!container) return;
    
    container.innerHTML = "";
    
    if (totalSessions === 0) {
      container.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1;">
          <div class="empty-emoji">📭✨</div>
          <h3 style="font-size:1.6rem; margin-bottom:0.5rem;">No sessions available yet</h3>
          <p style="opacity:0.9;">New adventures are on the way. Check back soon!</p>
        </div>
      `;
      return;
    }
    
    // Build each session card – no description element
    for (let i = 1; i <= totalSessions; i++) {
      const data = getSessionData(i);
      const sessionLink = `session_${i}.html`;
      const card = document.createElement("a");
      card.href = sessionLink;
      card.className = "session-card";
      
      // subtle background variation for visual interest
      let lightBg;
      if (i === 1) lightBg = "#F1FAFF";
      else if (i === 2) lightBg = "#F9F3FF";
      else if (i === 3) lightBg = "#EBFFEF";
      else if (i === 4) lightBg = "#FDF2F8";
      else if (i === 5) lightBg = "#F0F9FF";
      else lightBg = "#F3E8FF";   
      card.style.background = `linear-gradient(145deg, #ffffff, ${lightBg})`;
      
      const delay = (i - 1) * 0.08;
      card.style.animationDelay = `${delay}s`;
      
      card.innerHTML = `
        <div class="card-emoji">${data.emoji}</div>
        <div class="session-title">${data.title}</div>
        <div class="card-action">
          <span>Start journey</span>
          <span class="arrow-icon">→</span>
        </div>
      `;
      
      card.setAttribute("aria-label", `Open ${data.title}`);
      container.appendChild(card);
    }
  })();
</script>

<style>
  .arrow-icon {
    font-size: 1.15rem;
    transition: transform 0.2s;
  }
  .session-card:hover .arrow-icon {
    transform: translateX(4px);
  }
  .session-card .card-action {
    justify-content: flex-start;
  }
  .session-card:hover .card-action {
    border-top-color: rgba(59,130,246,0.25);
  }
</style>
</body>
</html>
